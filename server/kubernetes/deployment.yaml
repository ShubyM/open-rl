apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-rl-server
  labels:
    app: open-rl-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-rl-server
  template:
    metadata:
      labels:
        app: open-rl-server
    spec:
      containers:
      - name: server
        image: gcr.io/cdrollouts-sunilarora/open-rl-server:latest
        imagePullPolicy: Always
        command: ["uv", "run", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_URL
          value: "redis://localhost:6379"
        - name: VLLM_URL
          value: "http://localhost:8001"
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: OPEN_RL_TMP_DIR
          value: "/tmp/open-rl"
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: "32Gi"
          requests:
            nvidia.com/gpu: "1"
            memory: "32Gi"
            cpu: "2"
        volumeMounts:
        - name: ramdisk
          mountPath: /tmp/open-rl
          
      - name: vllm
        image: gcr.io/cdrollouts-sunilarora/open-rl-server:latest
        imagePullPolicy: Always
        command: ["uv", "run", "python", "-m", "src.vllm_worker"]
        ports:
        - containerPort: 8001
        env:
        - name: VLLM_MODEL
          value: "Qwen/Qwen3-4B-Instruct-2507"
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: OPEN_RL_TMP_DIR
          value: "/tmp/open-rl"
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: "32Gi"
          requests:
            nvidia.com/gpu: "1"
            memory: "32Gi"
            cpu: "2"
        volumeMounts:
        - name: ramdisk
          mountPath: /tmp/open-rl

      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          limits:
            memory: "4Gi"
          requests:
            memory: "4Gi"
            cpu: "1"
            
      volumes:
      - name: ramdisk
        emptyDir:
          medium: Memory
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
