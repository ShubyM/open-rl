apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-rl-server
  labels:
    app: open-rl-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-rl-server
  template:
    metadata:
      labels:
        app: open-rl-server
    spec:
      containers:
      - name: server
        image: gcr.io/cdrollouts-sunilarora/open-rl-server:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        - containerPort: 8001
        env:
        - name: VLLM_MODEL
          value: "Qwen/Qwen3-4B-Instruct-2507"
        - name: TRAINER_GPU
          value: "0"
        - name: VLLM_GPU
          value: "1"
        - name: OPEN_RL_TMP_DIR
          value: "/tmp/open-rl"
        resources:
          limits:
            nvidia.com/gpu: 2
            memory: "32Gi"
          requests:
            nvidia.com/gpu: 2
            memory: "32Gi"
            cpu: "4"
        volumeMounts:
        - name: ramdisk
          mountPath: /tmp/open-rl
      volumes:
      - name: ramdisk
        emptyDir:
          medium: Memory
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
