# DRA smoke test: two pods pinned to ONE physical GPU via a shared ResourceClaim.
# No open-rl code involved — this validates only the scheduling layer that
# k8s/deploy/distributed-fft-timeslice relies on.
#
# Prereqs (docs/setup/gke-fft-timeslice.md §1): GKE 1.35+, DRA node pool with
# the device plugin disabled, NVIDIA driver installed manually (r570+), and the
# nvidia-dra-driver-gpu Helm chart running.
#
#   kubectl apply -f k8s/experiments/dra-shared-gpu-smoke.yaml
#
# Pass criteria:
#   1. Both pods reach Running on the SAME node:
#        kubectl get pods -n dra-smoke -o wide
#   2. Both logs show the SAME GPU UUID:
#        kubectl logs -n dra-smoke smoke-a | grep UUID
#        kubectl logs -n dra-smoke smoke-b | grep UUID
#   3. The claim shows one allocated device with two consumers:
#        kubectl describe resourceclaim -n dra-smoke shared-gpu
#
#   kubectl delete ns dra-smoke
---
apiVersion: v1
kind: Namespace
metadata:
  name: dra-smoke
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  namespace: dra-smoke
  name: shared-gpu
spec:
  devices:
    requests:
    - name: gpu
      exactly:
        deviceClassName: gpu.nvidia.com
---
apiVersion: v1
kind: Pod
metadata:
  namespace: dra-smoke
  name: smoke-a
spec:
  restartPolicy: Never
  containers:
  - name: ctr
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["nvidia-smi -L && nvidia-smi --query-gpu=driver_version --format=csv && sleep 600"]
    resources:
      claims:
      - name: shared-gpu
  resourceClaims:
  - name: shared-gpu
    resourceClaimName: shared-gpu
  nodeSelector:
    group.timeslice.io/trainers: "true"
  tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"
---
apiVersion: v1
kind: Pod
metadata:
  namespace: dra-smoke
  name: smoke-b
spec:
  restartPolicy: Never
  containers:
  - name: ctr
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args: ["nvidia-smi -L && nvidia-smi --query-gpu=driver_version --format=csv && sleep 600"]
    resources:
      claims:
      - name: shared-gpu
  resourceClaims:
  - name: shared-gpu
    resourceClaimName: shared-gpu
  nodeSelector:
    group.timeslice.io/trainers: "true"
  tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"
