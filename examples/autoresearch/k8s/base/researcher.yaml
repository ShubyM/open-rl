apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: autoresearch-researcher-1
  labels:
    app.kubernetes.io/name: autoresearch
    app.kubernetes.io/component: researcher
    open-rl/researcher: "1"
spec:
  podTemplate:
    spec:
      serviceAccountName: open-rl-sa
      restartPolicy: Never
      activeDeadlineSeconds: 21600
      containers:
      - name: researcher
        image: ghcr.io/gke-labs/open-rl/client:latest
        imagePullPolicy: Always
        resources:
          requests:
            ephemeral-storage: "10Gi"
            memory: "4Gi"
            cpu: "1"
          limits:
            ephemeral-storage: "10Gi"
            memory: "8Gi"
            cpu: "2"
        command: ["sh", "-c"]
        args:
        - |
          cd "${REPO_DIR}"
          exec uv run --no-sync --package open-rl-client python -m harness.agent
        envFrom:
        - configMapRef:
            name: autoresearch-settings
        - secretRef:
            name: researcher-agent-secrets
            optional: true
        env:
        - name: RESEARCHER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: shared-storage
          mountPath: /mnt/shared
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: open-rl-shared-pvc
