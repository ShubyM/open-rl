apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoresearch-ui
  labels:
    app.kubernetes.io/name: autoresearch
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: autoresearch
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: autoresearch
        app.kubernetes.io/component: ui
    spec:
      serviceAccountName: open-rl-sa
      containers:
      - name: ui
        image: ghcr.io/gke-labs/open-rl/client:latest
        imagePullPolicy: Always
        command: ["sh", "-c"]
        args:
        - |
          cd "${REPO_DIR}"
          uv run --no-sync --package open-rl-client python -m harness.ui \
            log_root="${LOG_ROOT}" \
            host=0.0.0.0 \
            port=8080 \
            interval_seconds=2 \
            serve=True
        envFrom:
        - configMapRef:
            name: autoresearch-settings
        ports:
        - name: http
          containerPort: 8080
        resources:
          requests:
            ephemeral-storage: "1Gi"
            memory: "256Mi"
            cpu: "100m"
          limits:
            ephemeral-storage: "1Gi"
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: shared-storage
          mountPath: /mnt/shared
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: open-rl-shared-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: autoresearch-ui
  labels:
    app.kubernetes.io/name: autoresearch
    app.kubernetes.io/component: ui
spec:
  selector:
    app.kubernetes.io/name: autoresearch
    app.kubernetes.io/component: ui
  ports:
  - name: http
    port: 8080
    targetPort: http
