apiVersion: v1
kind: ConfigMap
metadata:
  name: autoresearch-settings
data:
  RECIPE: replace-me/autoresearch.toml
  REPO_DIR: /app/autoresearch
  LOG_ROOT: /mnt/shared/open-rl/autoresearch/runs
  AGENT_FLAGS: "--include-directories /mnt/shared --yolo --output-format stream-json"
  ENABLE_GCP_TRACE: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoresearch-ui
  labels:
    app.kubernetes.io/name: autoresearch
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: autoresearch
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: autoresearch
        app.kubernetes.io/component: ui
    spec:
      serviceAccountName: open-rl-sa
      containers:
      - name: ui
        image: ghcr.io/gke-labs/open-rl/client:latest
        imagePullPolicy: Always
        command: ["sh", "-c"]
        args:
        - |
          cd "${REPO_DIR}"
          uv run --no-sync --package open-rl-client python -m ui.observer \
            log_root="${LOG_ROOT}" \
            host=0.0.0.0 \
            port=8080 \
            interval_seconds=2 \
            serve=True
        envFrom:
        - configMapRef:
            name: autoresearch-settings
        ports:
        - name: http
          containerPort: 8080
        resources:
          requests:
            ephemeral-storage: "1Gi"
            memory: "256Mi"
            cpu: "100m"
          limits:
            ephemeral-storage: "1Gi"
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: shared-storage
          mountPath: /mnt/shared
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: open-rl-shared-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: autoresearch-ui
  labels:
    app.kubernetes.io/name: autoresearch
    app.kubernetes.io/component: ui
spec:
  selector:
    app.kubernetes.io/name: autoresearch
    app.kubernetes.io/component: ui
  ports:
  - name: http
    port: 8080
    targetPort: http
---
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: autoresearch-researcher-1
  labels:
    app.kubernetes.io/name: autoresearch
    app.kubernetes.io/component: researcher
    open-rl/researcher: "1"
spec:
  podTemplate:
    spec:
      serviceAccountName: open-rl-sa
      restartPolicy: Never
      activeDeadlineSeconds: 21600
      containers:
      - name: researcher
        image: ghcr.io/gke-labs/open-rl/client:latest
        imagePullPolicy: Always
        resources:
          requests:
            ephemeral-storage: "10Gi"
            memory: "4Gi"
            cpu: "1"
          limits:
            ephemeral-storage: "10Gi"
            memory: "8Gi"
            cpu: "2"
        command: ["sh", "-c"]
        args:
        - exec "${REPO_DIR}/run_research_agent.sh"
        envFrom:
        - configMapRef:
            name: autoresearch-settings
        - secretRef:
            name: researcher-agent-secrets
            optional: true
        env:
        - name: RESEARCHER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: shared-storage
          mountPath: /mnt/shared
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: open-rl-shared-pvc
