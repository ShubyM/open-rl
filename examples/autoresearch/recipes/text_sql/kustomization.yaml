resources:
- ../../k8s/base

namePrefix: open-rl-

labels:
- includeSelectors: false
  pairs:
    app.kubernetes.io/part-of: open-rl-autoresearch
    autoresearch.open-rl.dev/task: text-sql

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: autoresearch-settings
  behavior: merge
  literals:
  - RECIPE=recipes/text_sql/autoresearch.toml
  - LOG_ROOT=/mnt/shared/open-rl/autoresearch
  - RUN_NAME=text-sql
  - TINKER_BASE_URL=http://open-rl-gateway-service:8000
  - ATTEMPT_TIMEOUT_MINUTES=30
  - AGENT_TIMEOUT_MINUTES=10
